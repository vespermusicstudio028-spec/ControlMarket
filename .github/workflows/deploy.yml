name: Deploy ControlMarket

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependências
      - name: Instalar dependências
        run: npm ci

      # 4. Build de produção
      - name: Build do projeto
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # 5. Instalar Supabase CLI
      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # 6. Aplicar migrations no Supabase
      - name: Aplicar migrations no Supabase
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 7. Deploy na Vercel
      - name: Deploy na Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      # 8. Notificação de sucesso
      - name: Deploy concluído
        run: |
          echo "✅ Deploy do ControlMarket finalizado com sucesso!"
          echo "🌐 Vercel: https://control-market-kohl.vercel.app"
          echo "🗄️  Supabase: https://supabase.com/dashboard/project/zjwpoxqymtvpttoswzhj"
